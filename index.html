<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MilkScreen — A modern browser-based MilkDrop music visualizer powered by Butterchurn WebGL" />
  <title>MilkScreen — Music Visualizer</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Visualizer Canvas (fullscreen, behind everything) -->
  <canvas id="visualizer-canvas"></canvas>

  <!-- ============== START SCREEN ============== -->
  <div id="start-screen">
    <div class="start-card">
      <div class="start-logo">
        <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" stroke="#ffffff" stroke-width="1.5" fill="none"/>
          <circle cx="32" cy="32" r="20" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.5"/>
          <circle cx="32" cy="32" r="10" stroke="#ffffff" stroke-width="0.75" fill="none" opacity="0.3"/>
          <circle cx="32" cy="32" r="3" fill="#ffffff"/>
        </svg>
        <h1>MilkScreen</h1>
        <p class="start-subtitle">MilkDrop Visualizer for the Browser</p>
      </div>

      <div class="start-sources">
        <h2>Choose Audio Source</h2>

        <button id="btn-mic" class="source-btn" type="button">
          <span class="source-icon">🎤</span>
          <span class="source-label">Microphone</span>
          <span class="source-desc">Visualize room audio or speakers</span>
        </button>

        <button id="btn-file" class="source-btn" type="button">
          <span class="source-icon">🎵</span>
          <span class="source-label">Audio File</span>
          <span class="source-desc">Load an MP3, WAV, or FLAC</span>
        </button>

        <input type="file" id="file-input" accept="audio/*" hidden />
      </div>

      <p class="start-hint">Requires WebGL 2 • Works best in Chrome or Firefox</p>
    </div>
  </div>

  <!-- ============== CONTROL BAR (bottom overlay) ============== -->
  <div id="control-bar" class="hidden">
    <div class="control-bar-inner">
      <!-- Preset Name -->
      <div class="control-section preset-info">
        <span class="preset-label" id="preset-name">Loading preset...</span>
      </div>

      <!-- Transport Controls -->
      <div class="control-section transport">
        <button id="btn-prev" class="ctrl-btn" title="Previous Preset (←)" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="btn-random" class="ctrl-btn" title="Random Preset (R)" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button id="btn-next" class="ctrl-btn" title="Next Preset (→)" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>

      <!-- Audio Source -->
      <div class="control-section audio-source">
        <button id="btn-switch-source" class="ctrl-btn" title="Switch Audio Source" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
          <span id="source-label">Mic</span>
        </button>
      </div>

      <!-- Preset Drawer Toggle -->
      <div class="control-section">
        <button id="btn-presets" class="ctrl-btn" title="Browse Presets (P)" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </button>
      </div>

      <!-- Fullscreen -->
      <div class="control-section">
        <button id="btn-fullscreen" class="ctrl-btn" title="Fullscreen (F)" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>

    <!-- Audio Player (for file mode) -->
    <div id="audio-player" class="hidden">
      <div class="player-info">
        <span id="audio-filename">No file loaded</span>
        <button id="btn-load-file" class="ctrl-btn" title="Load another audio file" type="button" style="margin-left: 8px; margin-right: auto; padding: 4px;">
          <svg viewBox="0 0 24 24" fill="currentColor" style="width: 16px; height: 16px;"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
        </button>
        <span id="audio-time">0:00 / 0:00</span>
      </div>
      <input type="range" id="audio-seek" class="seek-bar" min="0" max="100" value="0" step="0.1" />
      <div class="player-controls">
        <button id="btn-play-pause" class="ctrl-btn" title="Play/Pause (Space)" type="button">
          <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" class="hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <input type="range" id="audio-volume" class="volume-bar" min="0" max="1" value="0.8" step="0.01" />
      </div>
    </div>
  </div>

  <!-- ============== PRESET DRAWER (right side) ============== -->
  <div id="preset-drawer" class="hidden">
    <div class="drawer-header">
      <h3>Presets</h3>
      <button id="btn-close-drawer" class="ctrl-btn" title="Close (Esc)" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="drawer-search">
      <input type="text" id="preset-search" placeholder="Search presets..." autocomplete="off" />
    </div>
    <div class="drawer-count">
      <span id="preset-count">0</span> presets
    </div>
    <ul id="preset-list" class="drawer-list"></ul>
  </div>

  <!-- ============== NOTIFICATION TOAST ============== -->
  <div id="toast" class="hidden"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
