name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite web app
        run: npm run build

      - name: Generate Windows icon (.ico)
        run: magick "src-tauri/icons/128x128.png" -define icon:auto-resize=256,128,64,48,32,16 "src-tauri/icons/icon.ico"

      - name: Build Windows app
        run: npx tauri build --bundles msi,nsis

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DiscoCast-Visualizer-Windows-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30
